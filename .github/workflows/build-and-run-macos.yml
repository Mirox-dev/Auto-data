name: Build and run Mach-O

on:
  push:
  pull_request:

jobs:
  build_and_run_macos:
    runs-on: macos-latest

    steps:
      # 1. Загружаем код
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Устанавливаем Python
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Устанавливаем зависимости и PyInstaller
      - name: Install dependencies
        run: |
          pip install -r requirements.txt || true
          pip install pyinstaller

      # 4. Компилируем Python-программу в Mach-O
      - name: Build Mach-O binary
        run: |
          pyinstaller --onefile Авто_ИУЛ_1.1.py
          ls -l dist

      # 5. Запускаем Mach-O бинарник
      - name: Run Mach-O
        run: |
          chmod +x dist/main
          echo "Running Mach-O binary:"
          ./dist/main

      # 6. Сохраняем Mach-O как артефакт
      - name: Upload Mach-O artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-macho
          path: dist/main
